<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KAMI Map — Visual Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: system-ui, sans-serif; }
  #kami-map-canvas { width: 100%; height: 100%; display: block; }
  #status {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    background: rgba(0,0,0,0.75); color: #fff; padding: 8px 14px;
    border-radius: 8px; font-size: 13px; backdrop-filter: blur(8px);
    pointer-events: none;
  }
  #controls {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 10;
    display: flex; gap: 8px;
  }
  #controls button {
    background: rgba(0,0,0,0.7); color: #fff; border: 1px solid rgba(255,255,255,0.15);
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
    backdrop-filter: blur(8px);
  }
  #controls button:hover { background: rgba(60,60,60,0.8); }
  #error {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #ff3b5c; color: #fff; padding: 16px 24px; border-radius: 12px;
    font-size: 15px; display: none; z-index: 100; max-width: 80vw; text-align: center;
  }
</style>
</head>
<body>
<canvas id="kami-map-canvas"></canvas>
<div id="status">Initializing WebGPU...</div>
<div id="controls">
  <button onclick="flyTokyo()">Tokyo</button>
  <button onclick="flyNY()">New York</button>
  <button onclick="flyLondon()">London</button>
  <button onclick="zoomIn()">Zoom +</button>
  <button onclick="zoomOut()">Zoom -</button>
</div>
<div id="error"></div>

<script type="module">
import init, { KamiMap } from './pkg/kami_map.js';

const status = document.getElementById('status');
const errorEl = document.getElementById('error');
let map = null;
let tileCache = new Set();
let offscreenCanvas = null;
let offscreenCtx = null;

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
  console.error(msg);
}

async function main() {
  try {
    status.textContent = 'Loading WASM...';
    await init();

    status.textContent = 'Creating map...';
    map = await KamiMap.create('kami-map-canvas', JSON.stringify({
      center: [139.7671, 35.6812],
      zoom: 12,
      tile_url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    }));

    // Offscreen canvas for tile image → RGBA conversion
    offscreenCanvas = document.createElement('canvas');
    offscreenCanvas.width = 256;
    offscreenCanvas.height = 256;
    offscreenCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

    status.textContent = 'Fetching tiles...';

    // Start render loop
    let lastTime = performance.now();
    let frameCount = 0;
    let lastFpsUpdate = lastTime;

    function frame(now) {
      const dt = now - lastTime;
      lastTime = now;

      // Fetch tiles every frame (tiles_to_fetch returns only unfetched ones)
      fetchNewTiles();

      map.frame(dt);

      // FPS counter
      frameCount++;
      if (now - lastFpsUpdate > 1000) {
        const fps = Math.round(frameCount * 1000 / (now - lastFpsUpdate));
        const vp = JSON.parse(map.get_viewport());
        status.textContent = `${fps} fps | z${vp.zoom.toFixed(1)} | ${vp.lat.toFixed(4)}, ${vp.lng.toFixed(4)} | ${tileCache.size} tiles`;
        frameCount = 0;
        lastFpsUpdate = now;
      }

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // Input event listeners
    const canvas = document.getElementById('kami-map-canvas');

    canvas.addEventListener('pointerdown', (e) => {
      canvas.setPointerCapture(e.pointerId);
      map.on_pointer_down(e.offsetX, e.offsetY, e.button);
    });
    canvas.addEventListener('pointermove', (e) => {
      map.on_pointer_move(e.offsetX, e.offsetY, e.movementX, e.movementY);
    });
    canvas.addEventListener('pointerup', (e) => {
      map.on_pointer_up(e.offsetX, e.offsetY);
    });
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      map.on_wheel(e.deltaY);
    }, { passive: false });

    // Resize handler
    const ro = new ResizeObserver(() => {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      canvas.width = w;
      canvas.height = h;
      map.resize(w, h);
    });
    ro.observe(canvas);

  } catch (e) {
    showError(`Failed to initialize: ${e}`);
  }
}

async function fetchNewTiles() {
  if (!map) return;
  const tilesJson = map.tiles_to_fetch();
  const tiles = JSON.parse(tilesJson);

  for (const t of tiles) {
    const key = `${t.z}/${t.x}/${t.y}`;
    if (tileCache.has(key)) continue;
    tileCache.add(key);

    // Fetch tile in background (don't block frame)
    fetchTile(t).catch(err => {
      console.warn(`Tile ${key} failed:`, err);
      tileCache.delete(key); // Allow retry
    });
  }
}

async function fetchTile(t) {
  const resp = await fetch(t.url, { mode: 'cors' });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const blob = await resp.blob();
  const bmp = await createImageBitmap(blob);

  offscreenCtx.clearRect(0, 0, 256, 256);
  offscreenCtx.drawImage(bmp, 0, 0, 256, 256);
  const imageData = offscreenCtx.getImageData(0, 0, 256, 256);
  const rgba = new Uint8Array(imageData.data.buffer);

  map.upload_tile(t.z, t.x, t.y, rgba, 256, 256);
  bmp.close();
}

// Control functions
window.flyTokyo = () => map?.fly_to(139.7671, 35.6812, 14, 1500);
window.flyNY = () => map?.fly_to(-74.006, 40.7128, 13, 2000);
window.flyLondon = () => map?.fly_to(-0.1276, 51.5074, 13, 2000);
window.zoomIn = () => map?.set_zoom(map.get_zoom() + 1);
window.zoomOut = () => map?.set_zoom(map.get_zoom() - 1);

main();
</script>
</body>
</html>
