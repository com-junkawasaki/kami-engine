<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KAMI Graph Viewer</title>
<style>
:root {
  --bg: #09101d;
  --panel: rgba(255, 255, 255, 0.9);
  --panel-2: rgba(255, 255, 255, 0.98);
  --line: rgba(122, 145, 219, 0.22);
  --line-strong: rgba(122, 145, 219, 0.42);
  --text: #eaf0ff;
  --muted: #95a7d6;
  --control: #ffb86b;
  --runtime: #78c7ff;
  --infra: #9ea8ff;
  --app: #7ae7a1;
  --operations: #df9cff;
  --data: #f0dc78;
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background:
    radial-gradient(circle at top left, rgba(88, 117, 255, 0.16), transparent 30%),
    radial-gradient(circle at bottom right, rgba(0, 226, 169, 0.08), transparent 22%),
    var(--bg);
  color: var(--text);
  font: 13px/1.45 system-ui, sans-serif;
}
.layout {
  display: grid;
  grid-template-columns: 340px 1fr;
  width: 100%;
  height: 100%;
}
.sidebar {
  padding: 16px;
  overflow: auto;
  border-right: 1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(240, 234, 214, 0.98), rgba(255, 255, 255, 0.96)),
    radial-gradient(circle at top left, rgba(51, 191, 255, 0.16), transparent 28%);
}
.main {
  position: relative;
  min-width: 0;
  min-height: 0;
}
#sidebar-root {
  display: grid;
  gap: 12px;
}
.viewer-head {
  display: grid;
  gap: 6px;
  padding: 4px 2px 6px;
}
.viewer-title {
  margin: 0;
  color: #2d3436;
  font-size: 24px;
  font-weight: 900;
}
.viewer-subtitle {
  margin: 0;
  color: #636e72;
  font-size: 13px;
}
.sdk-stats {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}
.sdk-stat {
  padding: 10px;
  border-radius: 10px;
  background: rgba(240, 234, 214, 0.62);
  border: 1px solid rgba(45, 52, 54, 0.08);
  color: #2d3436;
}
.sdk-stat span {
  display: block;
  font-size: 11px;
  color: #636e72;
  font-weight: 800;
}
.sdk-stat strong {
  display: block;
  font-size: 18px;
}
.sdk-stack {
  display: grid;
  gap: 10px;
}
.sdk-field {
  display: grid;
  gap: 6px;
}
.sdk-inline {
  display: grid;
  gap: 10px;
}
.sdk-preset-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}
.preset-btn.active {
  border-color: #33bfff !important;
  background: #33bfff !important;
  color: #fff !important;
}
.sdk-list {
  display: grid;
  gap: 8px;
}
.sdk-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  color: #636e72;
}
label {
  display: grid;
  gap: 6px;
}
input[type="search"], select, input[type="range"], input[type="url"] {
  width: 100%;
}
input[type="search"], select, input[type="url"] {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(45, 52, 54, 0.12);
  background: #fff;
  color: #2d3436;
}
.range-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
  color: #2d3436;
}
.check-grid {
  display: grid;
  gap: 8px;
}
.check-row {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #2d3436;
}
.swatch {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  display: inline-block;
}
.top-line, .hint {
  color: #636e72;
}
.top-line {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}
#graph-shell {
  position: absolute;
  inset: 0;
  overflow: auto;
}
#graph-stage {
  min-width: 100%;
  min-height: 100%;
  padding: 84px 20px 20px;
}
#force-wrap {
  position: absolute;
  inset: 0;
}
#gc {
  width: 100%;
  height: 100%;
  display: block;
}
#svg-root {
  width: 100%;
  height: auto;
  min-height: calc(100vh - 104px);
  display: block;
}
#html-root {
  display: grid;
  gap: 16px;
}
#status {
  position: absolute;
  top: 14px;
  left: 14px;
  z-index: 10;
  max-width: min(620px, calc(100vw - 380px));
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: rgba(7, 12, 25, 0.86);
  backdrop-filter: blur(10px);
}
#badge-bar {
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 10;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
  max-width: min(680px, calc(100vw - 380px));
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 10px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(7, 12, 25, 0.84);
}
.layer-column {
  fill: rgba(255,255,255,0.02);
  stroke: var(--line);
  stroke-width: 1;
  rx: 18;
}
.node-box {
  stroke: rgba(255,255,255,0.15);
  stroke-width: 1;
  rx: 12;
}
.node-label {
  fill: var(--text);
  font-size: 12px;
  font-weight: 600;
}
.node-meta {
  fill: var(--muted);
  font-size: 10px;
}
.edge-line {
  fill: none;
  stroke: rgba(167, 186, 255, 0.28);
  stroke-width: 1.4;
}
.edge-thick {
  fill: none;
  stroke-opacity: 0.68;
}
.matrix-cell {
  stroke: rgba(255,255,255,0.08);
  stroke-width: 0.5;
}
.matrix-label {
  fill: var(--muted);
  font-size: 10px;
}
.flow-rect {
  stroke: rgba(255,255,255,0.12);
  stroke-width: 1;
  rx: 12;
}
.c4-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}
.c4-layer {
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 16px;
  background: rgba(255,255,255,0.03);
}
.c4-layer h3 {
  margin: 0 0 12px;
  font-size: 15px;
}
.c4-systems {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.c4-system {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 10px;
  background: rgba(0,0,0,0.14);
}
.c4-system strong {
  display: block;
  margin-bottom: 4px;
}
@media (max-width: 980px) {
  .layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }
  .sidebar {
    border-right: 0;
    border-bottom: 1px solid var(--line);
    max-height: 46vh;
  }
  #status, #badge-bar {
    max-width: calc(100vw - 28px);
  }
  .c4-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"><div id="sidebar-root"></div></aside>

  <main class="main">
    <div id="status">Loading graph viewer...</div>
    <div id="badge-bar"></div>
    <div id="graph-shell">
      <div id="force-wrap" hidden>
        <canvas id="gc"></canvas>
      </div>
      <div id="graph-stage">
        <svg id="svg-root" hidden></svg>
        <div id="html-root" hidden></div>
      </div>
    </div>
  </main>
</div>

<script src="../kami-ui-sdk/kami-motion.js"></script>
<script src="../kami-ui-sdk/kami-sound.js"></script>
<script src="../kami-ui-sdk/kami-effect.js"></script>
<script src="../kami-ui-sdk/kami-ui.js"></script>

<script type="module">
KamiUI.init();
document.addEventListener('click', () => KamiSound && KamiSound.init(), { once: true });

const params = new URLSearchParams(window.location.search);
const defaultDataUrl = params.get('data') || './haisen.json';
const defaultMode = params.get('mode') || 'haisen';
const defaultView = params.get('view') || (defaultMode === 'sos' ? 'layered' : 'force');

const layerColors = {
  control: '#ffb86b',
  runtime: '#78c7ff',
  infra: '#9ea8ff',
  app: '#7ae7a1',
  operations: '#df9cff',
  data: '#f0dc78'
};
const edgeColors = {
  invoke: '#fa5757',
  writes: '#33bfff',
  reads: '#66e673',
  subscribe: '#ffbf33',
  follow: '#b366f2'
};

const statusBar = KamiUI.StatusBar({ text: 'Loading viewer...', position: 'top-left' });
KamiUI.ControlHint({
  hints: [
    { key: 'Drag', action: 'pan' },
    { key: 'Wheel', action: 'zoom' },
    { key: 'Search', action: 'filter' },
    { key: 'Preset', action: 'focus' }
  ],
  position: 'bottom-left'
});
let legendWidget = KamiUI.Legend({
  position: 'bottom-right',
  items: []
});

const statusEl = document.getElementById('status');
const badgeBarEl = document.getElementById('badge-bar');
const svgRoot = document.getElementById('svg-root');
const htmlRoot = document.getElementById('html-root');
const forceWrap = document.getElementById('force-wrap');
const canvas = document.getElementById('gc');

let rawGraph;
let initialized = false;
let activeLayers = new Set();
let activePreset = 'all';
let renderToken = 0;
let kamiModulePromise = null;
let kamiInit = null;
let kamiRunWithGraph = null;

function createSelect(options, selectedValue) {
  const select = document.createElement('select');
  for (const option of options) {
    const el = document.createElement('option');
    el.value = option.value;
    el.textContent = option.label;
    if (option.value === selectedValue) el.selected = true;
    select.appendChild(el);
  }
  return select;
}

function createInput(type, attrs) {
  const input = document.createElement('input');
  input.type = type;
  Object.assign(input, attrs || {});
  return input;
}

function buildSidebarUI() {
  const sidebarRoot = document.getElementById('sidebar-root');
  const head = document.createElement('header');
  head.className = 'viewer-head';
  head.innerHTML = `
    <h1 class="viewer-title">KAMI Graph Viewer</h1>
    <p class="viewer-subtitle">SDK-side SoS / haisen viewer with layered, force, Sankey, DSM, and C4 modes on one graph source.</p>
  `;
  sidebarRoot.appendChild(head);

  const statsPanel = KamiUI.Panel({ title: 'Visible Graph', parent: sidebarRoot });
  const stats = document.createElement('div');
  stats.className = 'sdk-stats';
  stats.innerHTML = `
    <div class="sdk-stat"><span>Systems</span><strong id="visible-systems">-</strong></div>
    <div class="sdk-stat"><span>Interfaces</span><strong id="visible-interfaces">-</strong></div>
    <div class="sdk-stat"><span>Apps</span><strong id="visible-apps">-</strong></div>
    <div class="sdk-stat"><span>View</span><strong id="visible-view">-</strong></div>
  `;
  statsPanel.body.appendChild(stats);

  const sourcePanel = KamiUI.Panel({
    title: 'Data Source',
    subtitle: 'Query params: ?data=/path/to.json&mode=sos&view=layered',
    parent: sidebarRoot
  });
  const dataUrlEl = createInput('url', { id: 'data-url', placeholder: './haisen.json' });
  const graphModeEl = createSelect([
    { value: 'haisen', label: 'haisen' },
    { value: 'sos', label: 'sos' },
  ]);
  graphModeEl.id = 'graph-mode';
  KamiUI.Field({ label: 'JSON URL', control: dataUrlEl, parent: sourcePanel.body });
  KamiUI.Field({ label: 'Graph mode', control: graphModeEl, parent: sourcePanel.body });
  const sourceActions = document.createElement('div');
  sourceActions.className = 'sdk-inline';
  const reloadBtnEl = KamiUI.Button({ text: 'Reload JSON', variant: 'primary', parent: sourceActions }).el;
  const uploadWrap = document.createElement('div');
  sourceActions.appendChild(uploadWrap);
  sourcePanel.body.appendChild(sourceActions);

  const controlsPanel = KamiUI.Panel({ title: 'Controls', parent: sidebarRoot });
  const presetTitle = document.createElement('div');
  presetTitle.className = 'hint';
  presetTitle.textContent = 'Presets';
  controlsPanel.body.appendChild(presetTitle);
  const presetGridEl = document.createElement('div');
  presetGridEl.id = 'preset-grid';
  presetGridEl.className = 'sdk-preset-grid';
  for (const preset of [
    ['all', 'All'],
    ['project', 'Project only'],
    ['infra', 'Infra only'],
    ['runtime', 'Runtime only'],
    ['critical', 'Critical paths'],
  ]) {
    const btn = KamiUI.Button({ text: preset[1], parent: presetGridEl }).el;
    btn.classList.add('preset-btn');
    btn.dataset.preset = preset[0];
  }
  controlsPanel.body.appendChild(presetGridEl);

  const viewTypeEl = createSelect([
    { value: 'layered', label: 'Layered Directed' },
    { value: 'force', label: 'KAMI Force Graph' },
    { value: 'sankey', label: 'Sankey / Flow' },
    { value: 'dsm', label: 'DSM Matrix' },
    { value: 'c4', label: 'C4 / SoS Map' },
  ]);
  viewTypeEl.id = 'view-type';
  KamiUI.Field({ label: 'Graph form', control: viewTypeEl, parent: controlsPanel.body });

  const modeEl = createSelect([
    { value: 'overview', label: 'Overview' },
    { value: 'layer', label: 'Layer focus' },
    { value: 'full', label: 'Full' },
  ]);
  modeEl.id = 'mode';
  KamiUI.Field({ label: 'Aggregation mode', control: modeEl, parent: controlsPanel.body });

  const searchEl = createInput('search', { id: 'search', placeholder: 'e.g. states, pulumi, cloudflare, runtime' });
  KamiUI.Field({ label: 'Search systems / path / technology', control: searchEl, parent: controlsPanel.body });

  const topNEl = createInput('range', { id: 'top-n', min: '8', max: '80', step: '1', value: '24' });
  const topNRow = document.createElement('div');
  topNRow.className = 'range-row';
  const topNValueEl = document.createElement('strong');
  topNValueEl.id = 'top-n-value';
  topNValueEl.textContent = '24';
  topNRow.appendChild(topNEl);
  topNRow.appendChild(topNValueEl);
  KamiUI.Field({ label: 'Top project systems kept individually', control: topNRow, parent: controlsPanel.body });

  const layerLabel = document.createElement('div');
  layerLabel.className = 'hint';
  layerLabel.textContent = 'Layers';
  controlsPanel.body.appendChild(layerLabel);
  const layerFiltersEl = document.createElement('div');
  layerFiltersEl.id = 'layer-filters';
  layerFiltersEl.className = 'check-grid';
  controlsPanel.body.appendChild(layerFiltersEl);

  const guidancePanel = KamiUI.Panel({ title: 'View Guidance', parent: sidebarRoot });
  const guidanceList = document.createElement('div');
  guidanceList.className = 'sdk-list';
  guidanceList.innerHTML = `
    <div class="sdk-row"><span>Layered</span><span>structure / hierarchy</span></div>
    <div class="sdk-row"><span>Force</span><span>interactive local exploration</span></div>
    <div class="sdk-row"><span>Sankey</span><span>flow concentration</span></div>
    <div class="sdk-row"><span>DSM</span><span>coupling density</span></div>
    <div class="sdk-row"><span>C4 map</span><span>explanation / review</span></div>
  `;
  guidancePanel.body.appendChild(guidanceList);

  const topInterfacesPanel = KamiUI.Panel({ title: 'Top Interfaces', parent: sidebarRoot });
  const topInterfacesEl = document.createElement('div');
  topInterfacesEl.id = 'top-interfaces';
  topInterfacesEl.className = 'sdk-list';
  topInterfacesPanel.body.appendChild(topInterfacesEl);

  const loader = KamiUI.FileLoader({
    parent: uploadWrap,
    accept: '.json',
    onLoad: async text => {
      try {
        rawGraph = normalizeGraph(JSON.parse(text), graphModeEl.value);
        activePreset = 'all';
        activeLayers = new Set(rawGraph.layers.map(layer => layer.name));
        buildLayerFilters(rawGraph.layers.map(layer => layer.name));
        syncPresetButtons();
        await triggerRender();
        KamiUI.Toast('Loaded graph JSON', { type: 'success', duration: 1400 });
      } catch (err) {
        setStatus('Error parsing JSON: ' + (err && err.message ? err.message : String(err)));
      }
    }
  });

  return {
    loader,
    dataUrlEl,
    reloadBtnEl,
    graphModeEl,
    viewTypeEl,
    modeEl,
    searchEl,
    topNEl,
    topNValueEl,
    layerFiltersEl,
    topInterfacesEl,
    visibleSystemsEl: stats.querySelector('#visible-systems'),
    visibleInterfacesEl: stats.querySelector('#visible-interfaces'),
    visibleAppsEl: stats.querySelector('#visible-apps'),
    visibleViewEl: stats.querySelector('#visible-view'),
    presetGridEl,
  };
}

const sidebar = buildSidebarUI();
const {
  dataUrlEl,
  reloadBtnEl,
  graphModeEl,
  viewTypeEl,
  modeEl,
  searchEl,
  topNEl,
  topNValueEl,
  layerFiltersEl,
  topInterfacesEl,
  visibleSystemsEl,
  visibleInterfacesEl,
  visibleAppsEl,
  visibleViewEl,
  presetGridEl,
} = sidebar;

dataUrlEl.value = defaultDataUrl;
graphModeEl.value = defaultMode;
viewTypeEl.value = defaultView;
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (rawGraph) triggerRender();
});

function setStatus(text) {
  statusEl.textContent = text;
  statusBar.setText(text);
}

async function ensureKamiModule() {
  if (kamiRunWithGraph && kamiInit) return;
  if (!kamiModulePromise) {
    kamiModulePromise = import('./pkg/kami_web.js')
      .then(mod => {
        kamiInit = mod.default;
        kamiRunWithGraph = mod.run_with_graph;
      })
      .catch(err => {
        kamiModulePromise = null;
        throw err;
      });
  }
  try {
    setStatus('Loading kami-engine module...');
    await kamiModulePromise;
  } catch (err) {
    setStatus('Error loading kami-engine module: ' + (err && err.message ? err.message : String(err)));
    throw err;
  }
}

function updateLegend(mode) {
  const items = mode === 'sos'
    ? [
        { color: layerColors.control, label: 'control' },
        { color: layerColors.runtime, label: 'runtime' },
        { color: layerColors.infra, label: 'infra' },
        { color: layerColors.app, label: 'app' },
        { color: layerColors.operations, label: 'operations' },
        { color: layerColors.data, label: 'data' }
      ]
    : [
        { color: edgeColors.invoke, label: 'invoke' },
        { color: edgeColors.writes, label: 'writes' },
        { color: edgeColors.reads, label: 'reads' },
        { color: edgeColors.subscribe, label: 'subscribe' },
        { color: edgeColors.follow, label: 'follow' }
      ];
  legendWidget.remove();
  legendWidget = KamiUI.Legend({ position: 'bottom-right', items });
}

function esc(text) {
  return String(text ?? '').replace(/[&<>"]/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;'
  }[ch]));
}

function updateTopNLabel() {
  topNValueEl.textContent = topNEl.value;
}

function syncLayerCheckboxes() {
  for (const checkbox of layerFiltersEl.querySelectorAll('input[type="checkbox"]')) {
    checkbox.checked = activeLayers.has(checkbox.value);
  }
}

function syncPresetButtons() {
  for (const btn of presetGridEl.querySelectorAll('.preset-btn')) {
    btn.classList.toggle('active', btn.dataset.preset === activePreset);
  }
}

function showSurface(kind) {
  forceWrap.hidden = kind !== 'force';
  svgRoot.hidden = !(kind === 'layered' || kind === 'sankey' || kind === 'dsm');
  htmlRoot.hidden = kind !== 'c4';
}

function scoreSystem(system) {
  return (system.edge_count || 0) * 10 + (system.app_count || 0);
}

function normalizeGraph(raw, mode) {
  if (mode === 'sos') {
    return {
      ...raw,
      systems: raw.systems || [],
      interfaces: raw.interfaces || [],
      layers: raw.layers || [],
      stats: raw.stats || {}
    };
  }
  const apps = raw.apps || [];
  const edges = raw.edges || [];
  const appSystems = apps.map(app => ({
    id: app.nanoid || app.did || app.name,
    name: app.name || app.nanoid || app.did,
    system_type: 'project',
    layer: 'app',
    app_count: 1,
    deployed: 0,
    edge_count: 0,
    technologies: [app.runtime_type, app.ui_type].filter(Boolean),
    path: app.project || ''
  }));
  const systems = [
    ...(raw.infra || []).map(node => ({
      id: node.name || node.did,
      name: node.name || node.did,
      system_type: 'infra',
      layer: 'infra',
      app_count: 0,
      deployed: 0,
      edge_count: 0,
      technologies: [node.runtime_type].filter(Boolean)
    })),
    ...appSystems
  ];
  const interfaces = edges.map(edge => ({
    from: edge.from,
    to: edge.to,
    protocol: edge.edge_type || 'edge',
    edge_count: 1,
    description: edge.label
  }));
  const layers = [
    { name: 'infra', systems: systems.filter(s => s.layer === 'infra').map(s => s.id) },
    { name: 'app', systems: systems.filter(s => s.layer === 'app').map(s => s.id) }
  ].filter(layer => layer.systems.length > 0);
  const stats = {
    total_systems: systems.length,
    total_interfaces: interfaces.length,
    total_apps: apps.length
  };
  return { generated_at: raw.generated_at, systems, interfaces, layers, stats };
}

function buildLayerFilters(layers) {
  layerFiltersEl.textContent = '';
  for (const layer of layers) {
    const row = document.createElement('label');
    row.className = 'check-row';
    row.innerHTML = `
      <input type="checkbox" value="${layer}">
      <span class="swatch" style="background:${layerColors[layer] || '#ccc'}"></span>
      <span>${layer}</span>
    `;
    const checkbox = row.querySelector('input');
    checkbox.checked = activeLayers.has(layer);
    checkbox.addEventListener('change', () => {
      if (checkbox.checked) activeLayers.add(layer);
      else activeLayers.delete(layer);
      triggerRender();
    });
    layerFiltersEl.appendChild(row);
  }
}

function applyPreset(name) {
  activePreset = name;
  const allLayers = rawGraph.layers.map(layer => layer.name);
  if (name === 'all') {
    activeLayers = new Set(allLayers);
    searchEl.value = '';
    modeEl.value = 'overview';
    topNEl.value = '24';
  } else if (name === 'project') {
    activeLayers = new Set(['app']);
    searchEl.value = '';
    modeEl.value = 'overview';
    topNEl.value = '32';
  } else if (name === 'infra') {
    activeLayers = new Set(allLayers.filter(layer => layer !== 'app' && layer !== 'control' && layer !== 'runtime'));
    searchEl.value = '';
    modeEl.value = 'layer';
    topNEl.value = '16';
  } else if (name === 'runtime') {
    activeLayers = new Set(allLayers.filter(layer => ['control', 'runtime', 'infra'].includes(layer)));
    searchEl.value = '';
    modeEl.value = 'layer';
    topNEl.value = '18';
  } else if (name === 'critical') {
    activeLayers = new Set(allLayers.filter(layer => ['control', 'runtime', 'infra', 'data'].includes(layer)));
    searchEl.value = 'pds yata dispatcher pnpm nx cloudflare runtime';
    modeEl.value = 'layer';
    topNEl.value = '12';
  }
  updateTopNLabel();
  syncLayerCheckboxes();
  syncPresetButtons();
}

function systemMatches(system, query) {
  if (!query) return true;
  const hay = [
    system.id, system.name, system.path, system.system_type, system.layer,
    ...(system.technologies || []),
    ...(system.signals || []),
    ...Object.keys(system.version_hints || {}),
    ...Object.values(system.version_hints || {})
  ].filter(Boolean).join(' ').toLowerCase();
  return hay.includes(query);
}

function buildAggregatedGraph(raw, options) {
  const systemsById = new Map(raw.systems.map(system => [system.id, structuredClone(system)]));
  const visibleLayerSet = options.layers;
  const query = options.query;
  const mode = options.mode;
  const topN = options.topN;

  let allowed = raw.systems.filter(system => visibleLayerSet.has(system.layer || ''));
  if (query) {
    const direct = new Set(allowed.filter(system => systemMatches(system, query)).map(system => system.id));
    const expanded = new Set(direct);
    for (const iface of raw.interfaces) {
      if (direct.has(iface.from) || direct.has(iface.to)) {
        expanded.add(iface.from);
        expanded.add(iface.to);
      }
    }
    allowed = allowed.filter(system => expanded.has(system.id));
  }

  if (mode !== 'full') {
    const nonProjects = allowed.filter(system => system.system_type !== 'project');
    const projects = allowed.filter(system => system.system_type === 'project').sort((a, b) => scoreSystem(b) - scoreSystem(a));
    const chosenProjects = projects.slice(0, mode === 'layer' ? Math.min(topN, 36) : topN);
    allowed = [...nonProjects, ...chosenProjects];
  }

  const visibleIds = new Set(allowed.map(system => system.id));
  const omittedProjects = raw.systems.filter(system =>
    system.system_type === 'project' &&
    visibleLayerSet.has(system.layer || '') &&
    !visibleIds.has(system.id) &&
    (!query || systemMatches(system, query))
  );
  const needsAggregate = omittedProjects.length > 0 && mode !== 'full';
  if (needsAggregate) {
    const aggregate = {
      id: 'other_projects',
      name: 'Other Projects',
      system_type: 'project',
      layer: 'app',
      app_count: omittedProjects.reduce((sum, system) => sum + (system.app_count || 0), 0),
      deployed: omittedProjects.reduce((sum, system) => sum + (system.deployed || 0), 0),
      edge_count: omittedProjects.reduce((sum, system) => sum + (system.edge_count || 0), 0),
      technologies: ['aggregated']
    };
    allowed.push(aggregate);
    visibleIds.add('other_projects');
  }

  const remapId = new Map();
  if (needsAggregate) {
    for (const system of omittedProjects) remapId.set(system.id, 'other_projects');
  }

  const ifaceMap = new Map();
  for (const iface of raw.interfaces) {
    const from = remapId.get(iface.from) || iface.from;
    const to = remapId.get(iface.to) || iface.to;
    if (!visibleIds.has(from) || !visibleIds.has(to) || from === to) continue;
    const key = [from, to, iface.protocol].join('|');
    const existing = ifaceMap.get(key);
    if (existing) existing.edge_count += iface.edge_count || 0;
    else ifaceMap.set(key, { ...iface, from, to });
  }

  const systems = allowed.map(system => systemsById.get(system.id) || system).map(system => structuredClone(system));
  const interfaces = [...ifaceMap.values()].sort((a, b) => (b.edge_count || 0) - (a.edge_count || 0));
  const layers = raw.layers.map(layer => ({
    name: layer.name,
    systems: layer.systems.map(id => remapId.get(id) || id).filter((id, idx, arr) => visibleIds.has(id) && arr.indexOf(id) === idx)
  })).filter(layer => layer.systems.length > 0);

  return {
    generated_at: raw.generated_at,
    systems,
    interfaces,
    layers,
    stats: {
      ...raw.stats,
      total_systems: systems.length,
      total_interfaces: interfaces.length,
      total_apps: systems.reduce((sum, system) => sum + (system.app_count || 0), 0)
    }
  };
}

function refreshSidebar(graph, options) {
  visibleSystemsEl.textContent = String(graph.systems.length);
  visibleInterfacesEl.textContent = String(graph.interfaces.length);
  visibleAppsEl.textContent = String(graph.stats.total_apps || 0);
  visibleViewEl.textContent = options.view;

  badgeBarEl.textContent = '';
  for (const layer of graph.layers) {
    KamiUI.Badge(`${layer.name}: ${layer.systems.length}`, {
      color: layerColors[layer.name] || '#8aa0ff',
      parent: badgeBarEl,
    });
  }

  topInterfacesEl.textContent = '';
  for (const iface of graph.interfaces.slice(0, 14)) {
    const row = document.createElement('div');
    row.className = 'top-line';
    row.innerHTML = `<span>${esc(iface.from)} → ${esc(iface.to)}</span><span>${esc(iface.protocol)} · ${iface.edge_count}</span>`;
    topInterfacesEl.appendChild(row);
  }
}

function renderLayered(graph) {
  showSurface('layered');
  const systemsById = new Map(graph.systems.map(system => [system.id, system]));
  const positions = new Map();
  const orderedLayers = graph.layers.map(layer => layer.name);
  const width = Math.max(1200, orderedLayers.length * 280);
  const layerGap = 230;
  const nodeWidth = 170;
  const nodeHeight = 44;
  const maxNodes = Math.max(1, ...graph.layers.map(layer => layer.systems.length));
  const height = Math.max(900, maxNodes * 72 + 200);
  let svg = '';

  graph.layers.forEach((layer, idx) => {
    const x = 60 + idx * layerGap;
    svg += `<rect class="layer-column" x="${x-20}" y="70" width="190" height="${height-120}"></rect>`;
    svg += `<text class="node-label" x="${x}" y="48">${esc(layer.name)}</text>`;
    layer.systems.forEach((id, row) => positions.set(id, { x, y: 98 + row * 72 }));
  });

  for (const iface of graph.interfaces.slice(0, 220)) {
    const from = positions.get(iface.from);
    const to = positions.get(iface.to);
    if (!from || !to) continue;
    const color = layerColors[systemsById.get(iface.from)?.layer] || '#8aa0ff';
    const sx = from.x + nodeWidth;
    const sy = from.y + nodeHeight / 2;
    const tx = to.x;
    const ty = to.y + nodeHeight / 2;
    const mx = (sx + tx) / 2;
    svg += `<path class="edge-line edge-thick" d="M ${sx} ${sy} C ${mx} ${sy}, ${mx} ${ty}, ${tx} ${ty}" stroke="${color}" stroke-width="${1 + Math.min(7, iface.edge_count / 8)}"></path>`;
  }

  for (const [id, pos] of positions) {
    const system = systemsById.get(id);
    const color = layerColors[system.layer] || '#8aa0ff';
    svg += `<rect class="node-box" x="${pos.x}" y="${pos.y}" width="${nodeWidth}" height="${nodeHeight}" fill="${color}22"></rect>`;
    svg += `<text class="node-label" x="${pos.x+10}" y="${pos.y+18}">${esc(system.name || system.id)}</text>`;
    svg += `<text class="node-meta" x="${pos.x+10}" y="${pos.y+33}">apps=${system.app_count || 0} edges=${system.edge_count || 0}</text>`;
  }
  svgRoot.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svgRoot.innerHTML = svg;
}

function renderSankey(graph) {
  showSurface('sankey');
  const width = Math.max(1200, graph.layers.length * 240);
  const height = 900;
  const nodeWidth = 140;
  const gap = 90;
  const layerPositions = new Map();
  let svg = '';
  graph.layers.forEach((layer, idx) => {
    const systems = graph.systems.filter(system => layer.systems.includes(system.id));
    const value = systems.reduce((sum, system) => sum + Math.max(1, system.edge_count || 1), 0);
    const x = 80 + idx * (nodeWidth + gap);
    const boxHeight = Math.max(140, systems.length * 18 + 70);
    const y = 120;
    layerPositions.set(layer.name, { x, y, boxHeight });
    svg += `<rect class="flow-rect" x="${x}" y="${y}" width="${nodeWidth}" height="${boxHeight}" fill="${(layerColors[layer.name] || '#888') + '22'}"></rect>`;
    svg += `<text class="node-label" x="${x+14}" y="${y+24}">${esc(layer.name)}</text>`;
    svg += `<text class="node-meta" x="${x+14}" y="${y+42}">systems=${systems.length} total=${value}</text>`;
    systems.slice(0, 10).forEach((system, row) => {
      svg += `<text class="node-meta" x="${x+14}" y="${y+64+row*16}">${esc(system.name || system.id)}</text>`;
    });
  });
  for (let i = 0; i < graph.layers.length - 1; i++) {
    const current = graph.layers[i];
    const next = graph.layers[i+1];
    const from = layerPositions.get(current.name);
    const to = layerPositions.get(next.name);
    let flow = 0;
    for (const iface of graph.interfaces) {
      const fromLayer = graph.systems.find(system => system.id === iface.from)?.layer;
      const toLayer = graph.systems.find(system => system.id === iface.to)?.layer;
      if (fromLayer === current.name && toLayer === next.name) flow += iface.edge_count || 0;
    }
    const thickness = Math.max(14, Math.min(90, flow / 10));
    const sy = from.y + from.boxHeight / 2;
    const ty = to.y + to.boxHeight / 2;
    const sx = from.x + nodeWidth;
    const tx = to.x;
    const mx = (sx + tx) / 2;
    svg += `<path class="edge-thick" d="M ${sx} ${sy} C ${mx} ${sy}, ${mx} ${ty}, ${tx} ${ty}" stroke="${layerColors[next.name] || '#8aa0ff'}" stroke-width="${thickness}" fill="none"></path>`;
    svg += `<text class="node-meta" x="${mx-20}" y="${(sy+ty)/2 - 8}">${flow}</text>`;
  }
  svgRoot.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svgRoot.innerHTML = svg;
}

function renderDSM(graph) {
  showSurface('dsm');
  const systems = [...graph.systems].sort((a, b) => scoreSystem(b) - scoreSystem(a)).slice(0, 28);
  const ids = systems.map(system => system.id);
  const indexById = new Map(ids.map((id, idx) => [id, idx]));
  const size = 22;
  const offset = 230;
  const width = offset + ids.length * size + 80;
  const height = offset + ids.length * size + 80;
  const matrix = Array.from({ length: ids.length }, () => Array(ids.length).fill(0));
  for (const iface of graph.interfaces) {
    const i = indexById.get(iface.from);
    const j = indexById.get(iface.to);
    if (i == null || j == null) continue;
    matrix[i][j] += iface.edge_count || 0;
  }
  let max = 0;
  matrix.forEach(row => row.forEach(v => { if (v > max) max = v; }));
  let svg = '';
  ids.forEach((id, idx) => {
    const label = systems[idx].name || id;
    svg += `<text class="matrix-label" x="${offset-8}" y="${offset + idx*size + 15}" text-anchor="end">${esc(label)}</text>`;
    svg += `<text class="matrix-label" transform="translate(${offset + idx*size + 15},${offset-10}) rotate(-60)">${esc(label)}</text>`;
  });
  matrix.forEach((row, i) => row.forEach((value, j) => {
    const intensity = max ? value / max : 0;
    const fill = value === 0 ? 'rgba(255,255,255,0.03)' : `rgba(122, 231, 161, ${0.12 + intensity * 0.75})`;
    svg += `<rect class="matrix-cell" x="${offset + j*size}" y="${offset + i*size}" width="${size}" height="${size}" fill="${fill}"></rect>`;
  }));
  svgRoot.setAttribute('viewBox', `0 0 ${width} ${height}`);
  svgRoot.innerHTML = svg;
}

function renderC4(graph) {
  showSurface('c4');
  htmlRoot.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'c4-grid';
  for (const layer of graph.layers) {
    const systems = graph.systems.filter(system => layer.systems.includes(system.id)).sort((a, b) => scoreSystem(b) - scoreSystem(a));
    const section = document.createElement('section');
    section.className = 'c4-layer';
    section.innerHTML = `<h3><span class="swatch" style="background:${layerColors[layer.name] || '#ccc'}"></span> ${esc(layer.name)}</h3>`;
    const list = document.createElement('div');
    list.className = 'c4-systems';
    const limit = layer.name === 'app' ? 16 : 10;
    for (const system of systems.slice(0, limit)) {
      const item = document.createElement('div');
      item.className = 'c4-system';
      item.innerHTML = `<strong>${esc(system.name || system.id)}</strong><div class="hint">${esc(system.system_type)}</div><div class="hint">apps=${system.app_count || 0} deployed=${system.deployed || 0} edges=${system.edge_count || 0}</div>`;
      list.appendChild(item);
    }
    if (systems.length > limit) {
      const more = document.createElement('div');
      more.className = 'c4-system';
      more.innerHTML = `<strong>+${systems.length - limit} more</strong><div class="hint">hidden to keep the map readable</div>`;
      list.appendChild(more);
    }
    section.appendChild(list);
    grid.appendChild(section);
  }
  htmlRoot.appendChild(grid);
}

async function renderForce(graph, mode) {
  showSurface('force');
  canvas.width = forceWrap.clientWidth || window.innerWidth;
  canvas.height = forceWrap.clientHeight || window.innerHeight;
  await ensureKamiModule();
  if (!initialized) {
    setStatus('Initializing KAMI engine...');
    await kamiInit();
    initialized = true;
  }
  await kamiRunWithGraph('gc', JSON.stringify(graph), mode);
}

async function renderView(graph, options) {
  const token = ++renderToken;
  refreshSidebar(graph, options);
  setStatus(`Rendering ${options.view} view with ${graph.systems.length} systems and ${graph.interfaces.length} interfaces...`);
  if (options.view === 'force') {
    await renderForce(graph, options.graphMode);
  } else if (options.view === 'layered') {
    renderLayered(graph);
  } else if (options.view === 'sankey') {
    renderSankey(graph);
  } else if (options.view === 'dsm') {
    renderDSM(graph);
  } else {
    renderC4(graph);
  }
  if (token !== renderToken) return;
  setStatus(`Rendered ${options.view} view. Use presets, filters, and search to compare structures.`);
}

async function triggerRender() {
  if (!rawGraph) return;
  updateTopNLabel();
  const options = {
    graphMode: graphModeEl.value,
    view: viewTypeEl.value,
    mode: modeEl.value,
    query: searchEl.value.trim().toLowerCase(),
    topN: Number(topNEl.value),
    layers: new Set(activeLayers)
  };
  const graph = buildAggregatedGraph(rawGraph, options);
  await renderView(graph, options);
}

async function loadFromUrl() {
  const dataUrl = dataUrlEl.value.trim();
  if (!dataUrl) return;
  setStatus(`Fetching ${dataUrl} ...`);
  const res = await fetch(dataUrl, { cache: 'no-store' });
  if (!res.ok) throw new Error(`failed to fetch graph JSON: HTTP ${res.status}`);
  rawGraph = normalizeGraph(await res.json(), graphModeEl.value);
  activeLayers = new Set(rawGraph.layers.map(layer => layer.name));
  buildLayerFilters(rawGraph.layers.map(layer => layer.name));
  activePreset = 'all';
  syncPresetButtons();
  updateLegend(graphModeEl.value);
  await triggerRender();
  KamiUI.Toast('Graph loaded', { type: 'success', duration: 1400 });
  if (typeof KamiSound !== 'undefined') KamiSound.play('loaded');
}

reloadBtnEl.addEventListener('click', () => loadFromUrl().catch(err => setStatus('Error: ' + (err && err.message ? err.message : String(err)))));
graphModeEl.addEventListener('change', () => loadFromUrl().catch(err => setStatus('Error: ' + (err && err.message ? err.message : String(err)))));
viewTypeEl.addEventListener('change', triggerRender);
modeEl.addEventListener('change', triggerRender);
searchEl.addEventListener('input', triggerRender);
topNEl.addEventListener('input', triggerRender);
presetGridEl.addEventListener('click', event => {
  const btn = event.target.closest('.preset-btn');
  if (!btn || !rawGraph) return;
  applyPreset(btn.dataset.preset);
  triggerRender();
});

try {
  await loadFromUrl();
} catch (err) {
  console.error(err);
  setStatus('Error: ' + (err && err.message ? err.message : String(err)));
}
</script>
