<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KAMI Engine — WebGPU</title>
<style>
  body { margin: 0; background: #111; overflow: hidden; }
  canvas { width: 100vw; height: 100vh; display: block; }
  #info { position: fixed; top: 10px; left: 10px; color: #aaa; font: 14px monospace; z-index: 10; }
</style>
</head>
<body>
<div id="info">KAMI Engine — Loading WebGPU...</div>
<canvas id="kami-canvas"></canvas>
<script type="module">
import init, { run } from './pkg/kami_web.js';
async function main() {
  await init();
  document.getElementById('info').textContent = 'KAMI Engine — Hub Island (WebGPU)';
  await run('kami-canvas');
}
main().catch(e => {
  document.getElementById('info').textContent = 'Error: ' + e;
  console.error(e);
});
</script>
</body>
</html>
