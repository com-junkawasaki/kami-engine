<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KAMI Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0a1a; }
    #game-canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f0a1a; z-index: 100; transition: opacity 0.5s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 32px; font-weight: 800; letter-spacing: 0.1em; background: linear-gradient(135deg, #9333ea, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; color: transparent; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; color: #a78bfa; margin-top: 8px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #4c1d95; border-top-color: #a78bfa; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #controls { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(15, 10, 26, 0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 12px; font-family: system-ui, -apple-system, sans-serif; font-size: 12px; color: #a78bfa; z-index: 10; pointer-events: none; transition: opacity 3s; white-space: nowrap; }
    #error { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #0f0a1a; z-index: 200; }
    #error.show { display: flex; }
    .error-text { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; color: #ef4444; }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="loading">
    <div class="title">KAMI ENGINE</div>
    <div class="subtitle" id="loading-status">Loading WebGPU...</div>
    <div class="spinner"></div>
  </div>

  <div id="controls">WASD to move &middot; Mouse to look &middot; Click to lock cursor &middot; ESC to exit</div>

  <div id="error">
    <div class="error-text" id="error-text">WebGPU is not available in this browser</div>
    <div class="subtitle" style="margin-top:8px" id="error-detail">Please use Chrome 113+ or Edge 113+</div>
  </div>

  <script type="module">
    import init, { run, run_with_scene } from './pkg/kami_web.js';

    const $loading = document.getElementById('loading');
    const $status = document.getElementById('loading-status');
    const $error = document.getElementById('error');
    const $errorText = document.getElementById('error-text');
    const $errorDetail = document.getElementById('error-detail');
    const $controls = document.getElementById('controls');

    function showError(msg, detail) {
      $loading.classList.add('hidden');
      $errorText.textContent = msg;
      if (detail) $errorDetail.textContent = detail;
      $error.classList.add('show');
    }

    // Check WebGPU support
    if (!navigator.gpu) {
      showError('WebGPU is not available in this browser', 'Please use Chrome 113+ or Edge 113+');
      throw new Error('WebGPU not available');
    }

    // ESC to notify parent frame
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        window.parent.postMessage({ type: 'kami-close' }, '*');
      }
    });

    try {
      // Parse scene source from URL
      const params = new URLSearchParams(location.search);
      const sceneUrl = params.get('scene_url');
      const islandId = params.get('island_id');
      const hashScene = location.hash.startsWith('#scene=') ? atob(location.hash.slice(7)) : null;

      // Init WASM
      $status.textContent = 'Initializing WASM...';
      await init();

      let sceneJson = null;

      if (sceneUrl) {
        $status.textContent = 'Fetching scene...';
        const res = await fetch(sceneUrl);
        if (!res.ok) throw new Error('Failed to fetch scene: ' + res.status);
        sceneJson = await res.text();
      } else if (islandId) {
        $status.textContent = 'Loading island...';
        const res = await fetch('https://k4m1w0rk.etzhayyim.com/api/grpc/gftd.kami.v1.KamiQueryService/GetWorldScene', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ island_id: islandId }),
        });
        if (!res.ok) throw new Error('Failed to load island: ' + res.status);
        const data = await res.json();
        sceneJson = typeof data.scene === 'string' ? data.scene : JSON.stringify(data.scene);
      } else if (hashScene) {
        sceneJson = hashScene;
      }

      // Hide loading overlay
      $status.textContent = 'Starting engine...';
      $loading.classList.add('hidden');

      // Auto-hide controls hint after 5 seconds
      setTimeout(function() { $controls.style.opacity = '0'; }, 5000);

      // Start game
      if (sceneJson) {
        await run_with_scene('game-canvas', sceneJson);
      } else {
        await run('game-canvas');
      }
    } catch (e) {
      console.error('KAMI Engine error:', e);
      showError('Engine error: ' + e.message, 'Check console for details');
    }
  </script>
</body>
</html>
